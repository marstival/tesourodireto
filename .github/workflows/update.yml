name: Update Tesouro data

on:
  schedule:
    # Weekdays at 21:00 UTC = 18:00 BRT — after the daily data is published
    - cron: '0 21 * * 1-5'
  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683        # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Build JSON
        run: python src/build.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/tesouro.json
          if ! git diff --cached --quiet; then
            git commit -m "data: update $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No data changes — skipping commit."
          fi
