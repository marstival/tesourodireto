name: Update Tesouro data

on:
  schedule:
    # Weekdays at 21:00 UTC = 18:00 BRT — after the daily data is published
    - cron: '0 21 * * 1-5'
  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd        # v6.0.2 (Node 24)
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0 (Node 24)
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Build JSON
        run: python src/build.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/tesouro.json
          if ! git diff --cached --quiet; then
            git commit -m "data: update $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No data changes — skipping commit."
          fi
